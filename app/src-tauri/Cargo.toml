[package]
name = "OpenHuman"
version = "0.52.15"
description = "OpenHuman - AI-powered Super Assistant"
authors = ["OpenHuman"]
edition = "2021"
default-run = "OpenHuman"
autobins = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "openhuman"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "OpenHuman"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }
serde_json = "1"

[dependencies]
# Tauri core and plugins.
#
# Default build uses the stock `wry` backend (WKWebView on macOS, WebView2 on
# Windows, WebKitGTK on Linux). Passing `--features cef` swaps the runtime to
# CEF (Chromium Embedded Framework) via `tauri-runtime-cef` — the `[patch.
# crates-io]` block at the bottom of this file pins every tauri crate and
# plugin to the `feat/cef` branch on github so CEF symbols are even in scope.
# Keeping `cef` optional lets contributors without the CEF binaries still run
# `yarn tauri dev` on the wry backend.
tauri = { version = "2.10", default-features = false, features = [
    "common-controls-v6",
    "macos-private-api",
    "tray-icon",
    "unstable",
] }
tauri-plugin-deep-link = "2.0.0"
tauri-plugin-global-shortcut = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "process", "sync", "time", "net"] }
# WebSocket client for the Chrome DevTools Protocol (used to talk to the
# embedded CEF instance over `--remote-debugging-port=9222` and read
# IndexedDB / drive `Runtime.evaluate` for the WhatsApp recipe).
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect"] }
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
semver = "1"

log = "0.4"
env_logger = "0.11"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", default-features = false, features = ["signal"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2-app-kit = "0.3.2"
objc2-core-graphics = "0.3.2"

[features]
# Default runtime is wry (OS-native webview). The `cef` feature swaps in CEF
# (bundled Chromium). The two are mutually exclusive — the `feat/cef` branch
# re-exports `webview_version` from both runtime crates without cfg gates, so
# enabling both at once fails to compile. Users opt into CEF with
# `--no-default-features --features cef`.
default = ["wry"]
wry = ["tauri/wry"]
cef = ["tauri/cef", "tauri/devtools"]
# This feature is used for production builds or when a dev server is not specified, DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
sandbox-bubblewrap = []

[patch.crates-io]
# CEF support lives on the `feat/cef` branch of tauri-apps/tauri and the
# matching `feat/cef` branch of tauri-apps/plugins-workspace. The patch is
# always active (not gated on the `cef` feature) because cargo doesn't support
# conditional patches — it's a no-op for wry builds since the branch still
# exposes the wry runtime.
tauri = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-build = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-utils = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-macros = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-runtime = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-runtime-wry = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-plugin = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }

tauri-plugin-opener = { git = "https://github.com/tauri-apps/plugins-workspace", branch = "feat/cef" }
tauri-plugin-deep-link = { git = "https://github.com/tauri-apps/plugins-workspace", branch = "feat/cef" }
tauri-plugin-global-shortcut = { git = "https://github.com/tauri-apps/plugins-workspace", branch = "feat/cef" }

# Fast CI builds: trade runtime perf for compile speed
[profile.ci]
inherits = "release"
opt-level = 1
codegen-units = 16
lto = false
incremental = false
strip = true
debug = false
