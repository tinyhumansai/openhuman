id = "integrations_agent"
display_name = "Integrations Agent"
when_to_use = "Service integration specialist — drives a SINGLE Composio toolkit per spawn (gmail, notion, github, slack, …). The `toolkit` argument is mandatory. Use when a task should be completed via a managed OAuth integration rather than raw HTTP / file I/O."
temperature = 0.4
max_iterations = 10
sandbox_mode = "none"
omit_identity = true
omit_memory_context = true
omit_safety_preamble = false
omit_skills_catalog = true

# `file_write` lets the agent save oversized tool payloads to workspace
# files (Path B in prompt.md). `csv_export` was previously included but
# removed — it was triggering superfluous export calls even after the
# answer had already been synthesised. Re-add here only if a typed CSV
# path is needed again.
extra_tools = ["file_write"]

[model]
hint = "agentic"

[tools]
wildcard = {}
