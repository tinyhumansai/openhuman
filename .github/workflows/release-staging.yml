---
name: Release (Staging)
on:
  workflow_dispatch: {}
# `contents: write` is required to push the immutable `staging/v*` tag
# created by `prepare-build`. Permissions are kept narrower than the
# production release workflow (no `packages` write) because staging
# builds do not push container images or update releases.
permissions:
  contents: write
concurrency:
  group: release-staging
  cancel-in-progress: false
# ---------------------------------------------------------------------------
# Job dependency graph
#
#   prepare-build
#        │
#   build-desktop (matrix: macOS arm64, macOS x64, linux, windows)
# ---------------------------------------------------------------------------
jobs:
  # =========================================================================
  # Phase 1: Resolve build context (no version bump, no tag)
  # =========================================================================
  prepare-build:
    name: Prepare build context
    runs-on: ubuntu-latest
    # Reuse the Production GitHub Actions environment so Sentry vars
    # (`OPENHUMAN_*_SENTRY_DSN`, `SENTRY_PROJECT_*`, `SENTRY_ORG`,
    # `SENTRY_AUTH_TOKEN`) and `VITE_DEBUG` resolve here too. Staging
    # events differentiate from production via the `environment` tag set
    # at runtime — separate Sentry projects are not needed.
    environment: Production
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
      # First 12 chars of `sha`. Matches the truncation runtime code in
      # config.ts / vite.config.ts / main.rs / app/src-tauri/src/lib.rs
      # applies when computing `openhuman@<version>+<short_sha>`. Use this
      # (not `sha`) anywhere CI constructs SENTRY_RELEASE so uploaded
      # artifacts attach to the same release events report.
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      build_ref: ${{ steps.resolve.outputs.build_ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      base_url: ${{ steps.resolve.outputs.base_url }}
    steps:
      - name: Enforce main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "This workflow can only run from main. Current ref: $GITHUB_REF"
          exit 1
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Configure Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin --tags
      # Compute the next `staging/vX.Y.Z-N` tag. The script reads the
      # base version from `app/package.json` (kept untouched here — staging
      # never bumps versioned files) and counts existing staging tags for
      # that base to pick the next N.
      - name: Compute next staging tag
        id: bump
        shell: bash
        run: node scripts/release/next-staging-tag.js
      - name: Ensure staging tag does not already exist on remote
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag already exists on origin: ${TAG}"
            exit 1
          fi
      - name: Create and push staging tag
        id: tag
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        shell: bash
        run: |
          git tag -a "$TAG" -m "Staging build $TAG"
          git push origin "$TAG"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Resolve build outputs
        id: resolve
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
          SHA: ${{ steps.tag.outputs.sha }}
        shell: bash
        run: |
          # Match the 12-char truncation runtime code applies to
          # VITE_BUILD_SHA / OPENHUMAN_BUILD_SHA when constructing the
          # release tag at startup, so SENTRY_RELEASE assembled in CI
          # agrees with the tag events emit.
          SHORT_SHA="${SHA:0:12}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_ref=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "base_url=https://staging-api.tinyhumans.ai/" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # Phase 2: Build desktop artifacts (parallel matrix, debug profile)
  # =========================================================================
  build-desktop:
    name: "Desktop: ${{ matrix.settings.artifact_suffix }}"
    needs: [prepare-build]
    runs-on: ${{ matrix.settings.platform }}
    # Reuse the Production GH Actions environment so the Sentry vars and
    # `SENTRY_AUTH_TOKEN` secret resolve here. Staging builds tag their
    # events with `environment: staging` at runtime (set by APP_ENVIRONMENT
    # in app/src/utils/config.ts and resolve_sentry_environment() in the
    # Rust shell), so they're filterable in Sentry without separate
    # projects.
    environment: Production
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            artifact_suffix: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            artifact_suffix: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb
            target: x86_64-unknown-linux-gnu
            artifact_suffix: ubuntu
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENHUMAN_APP_ENV: staging
      VITE_OPENHUMAN_APP_ENV: staging
      OPENHUMAN_TELEGRAM_BOT_USERNAME: alphahumantest_bot
      VITE_TELEGRAM_BOT_USERNAME: alphahumantest_bot
    steps:
      - name: Checkout build ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-build.outputs.build_ref }}
          fetch-depth: 1
          submodules: recursive
      - name: Set Xcode version
        if: matrix.settings.platform == 'macos-latest'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.settings.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Tauri dependencies (ubuntu only)
        if: matrix.settings.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf cmake libasound2-dev libxdo-dev libxtst-dev libx11-dev libxi-dev \
            libevdev-dev libssl-dev libclang-dev \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1 libu2f-udev
      - name: Dump missing shared libs (debug)
        if: matrix.settings.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set +e
          for BIN in \
            app/src-tauri/target/${{ matrix.settings.target }}/debug/OpenHuman \
            target/${{ matrix.settings.target }}/debug/OpenHuman; do
            if [ -x "$BIN" ]; then
              echo "ldd $BIN"
              ldd "$BIN" | grep 'not found' || echo "  all resolved"
            fi
          done

      # Skip first 7 lines of Cargo.lock (workspace package version bumps) so the key tracks dependency changes only
      - name: Cargo.lock fingerprint (deps only)
        id: cargo-lock-fingerprint
        shell: bash
        run: |
          echo "hash=$(tail -n +8 Cargo.lock | openssl dgst -sha256 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Cargo registry and git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key:
            ${{ runner.os }}-cargo-registry-${{ steps.cargo-lock-fingerprint.outputs.hash
            }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache CEF binary distribution (unix)
        if: matrix.settings.platform != 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/tauri-cef
            ~/.cache/tauri-cef
          key:
            cef-${{ matrix.settings.target }}-${{ hashFiles('app/src-tauri/Cargo.toml')
            }}
          restore-keys: |
            cef-${{ matrix.settings.target }}-
      - name: Cache CEF binary distribution (windows)
        if: matrix.settings.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/tauri-cef
          key:
            cef-${{ matrix.settings.target }}-${{ hashFiles('app/src-tauri/Cargo.toml')
            }}
          restore-keys: |
            cef-${{ matrix.settings.target }}-

      - name: Cache vendored tauri-cli binary (unix)
        if: matrix.settings.platform != 'windows-latest'
        id: tauri-cli-cache-unix
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key:
            vendored-tauri-cli-${{ runner.os }}-${{ hashFiles('app/src-tauri/vendor/tauri-cef/crates/tauri-cli/Cargo.toml')
            }}
      - name: Cache vendored tauri-cli binary (windows)
        if: matrix.settings.platform == 'windows-latest'
        id: tauri-cli-cache-windows
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key:
            vendored-tauri-cli-${{ runner.os }}-${{ hashFiles('app/src-tauri/vendor/tauri-cef/crates/tauri-cli/Cargo.toml')
            }}
      - name: Install vendored tauri-cli (cef-aware bundler)
        if:
          (matrix.settings.platform == 'windows-latest' && steps.tauri-cli-cache-windows.outputs.cache-hit
          != 'true') || (matrix.settings.platform != 'windows-latest' && steps.tauri-cli-cache-unix.outputs.cache-hit
          != 'true')
        shell: bash
        run: cargo install --locked --path app/src-tauri/vendor/tauri-cef/crates/tauri-cli
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Define Tauri configuration overrides
        id: config-overrides
        uses: actions/github-script@v7
        env:
          BASE_URL: ${{ needs.prepare-build.outputs.base_url }}
        with:
          script: |
            const workspacePath = process.env.GITHUB_WORKSPACE.replace(/\\/g, '/');
            const prefix = workspacePath.startsWith('/') ? 'file://' : 'file:///';
            const moduleUrl = `${prefix}${workspacePath}/scripts/prepareTauriConfig.js`;
            const { default: prepareTauriConfig } = await import(moduleUrl);
            const config = prepareTauriConfig();
            core.setOutput('json', JSON.stringify(config));

      - name: Resolve core manifest and binary names
        id: core-paths
        shell: bash
        run: |
          if [ -f "openhuman_core/Cargo.toml" ]; then
            CORE_DIR="openhuman_core"
          elif [ -f "rust-core/Cargo.toml" ]; then
            CORE_DIR="rust-core"
          elif [ -f "Cargo.toml" ] && grep -q '^name = "openhuman"' Cargo.toml; then
            CORE_DIR="."
          else
            echo "No core Cargo manifest found (expected root Cargo.toml with openhuman, openhuman_core/Cargo.toml, or rust-core/Cargo.toml)"
            exit 1
          fi
          SIDE_CAR_BASE="$(node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('app/src-tauri/tauri.conf.json','utf8'));const b=(c.bundle&&Array.isArray(c.bundle.externalBin)&&c.bundle.externalBin[0])||'binaries/openhuman-core';process.stdout.write(String(b).split('/').pop());")"
          CORE_BIN_NAME="${SIDE_CAR_BASE}"
          BUILD_PROFILE="debug"
          echo "core_dir=$CORE_DIR" >> "$GITHUB_OUTPUT"
          echo "core_manifest=$CORE_DIR/Cargo.toml" >> "$GITHUB_OUTPUT"
          echo "core_target_dir=target/$MATRIX_TARGET/$BUILD_PROFILE" >> "$GITHUB_OUTPUT"
          echo "build_profile=$BUILD_PROFILE" >> "$GITHUB_OUTPUT"
          echo "core_bin_name=$CORE_BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "sidecar_base=$SIDE_CAR_BASE" >> "$GITHUB_OUTPUT"
        env:
          MATRIX_TARGET: ${{ matrix.settings.target }}
      - name: Build sidecar core binary
        shell: bash
        run: |
          cargo build \
            --manifest-path "$CORE_MANIFEST" \
            --target "$MATRIX_TARGET" \
            --bin "$CORE_BIN_NAME"
        env:
          MATRIX_TARGET: ${{ matrix.settings.target }}
          CORE_MANIFEST: ${{ steps.core-paths.outputs.core_manifest }}
          CORE_BIN_NAME: ${{ steps.core-paths.outputs.core_bin_name }}
          OPENHUMAN_APP_ENV: staging
          # Bake the short SHA into the CLI binary so build_release_tag() in
          # src/main.rs produces openhuman@<version>+<sha> — matching the
          # Sentry release tag used when uploading the standalone CLI symbols.
          OPENHUMAN_BUILD_SHA: ${{ needs.prepare-build.outputs.short_sha }}
      - name: Stage sidecar for Tauri bundler
        shell: bash
        run: |
          bash scripts/release/stage-sidecar.sh \
            "${{ matrix.settings.target }}" \
            "${{ steps.core-paths.outputs.core_target_dir }}" \
            "${{ steps.core-paths.outputs.core_bin_name }}" \
            "${{ steps.core-paths.outputs.sidecar_base }}"

      - name: Build and package Tauri app (CEF, vendored CLI, debug)
        shell: bash
        working-directory: app
        env:
          BASE_URL: ${{ needs.prepare-build.outputs.base_url }}
          VITE_BACKEND_URL: ${{ needs.prepare-build.outputs.base_url }}
          VITE_DEBUG: ${{ vars.VITE_DEBUG }}
          # ----- Sentry wiring (mirrors release.yml's build-desktop step) -----
          # React frontend Sentry DSN — baked by the Vite plugin via
          # `import.meta.env.VITE_SENTRY_DSN`. Without this, `Sentry.init`
          # in app/src/services/analytics.ts returns early and no events
          # report from the staging build.
          VITE_SENTRY_DSN: ${{ vars.OPENHUMAN_REACT_SENTRY_DSN }}
          # Tauri shell DSN — baked into the shell binary via
          # `option_env!("OPENHUMAN_TAURI_SENTRY_DSN")` at compile time.
          OPENHUMAN_TAURI_SENTRY_DSN: ${{ vars.OPENHUMAN_TAURI_SENTRY_DSN }}
          # Build SHA threaded through to both the Vite bundle and the
          # Tauri shell so all surfaces emit the same release tag.
          OPENHUMAN_BUILD_SHA: ${{ needs.prepare-build.outputs.sha }}
          VITE_BUILD_SHA: ${{ needs.prepare-build.outputs.sha }}
          # Use short_sha (12 chars) — matches what config.ts /
          # vite.config.ts / main.rs / app/src-tauri/src/lib.rs all slice
          # VITE_BUILD_SHA / OPENHUMAN_BUILD_SHA down to at runtime when
          # emitting events. The vite plugin reads SENTRY_RELEASE raw, so
          # a long-SHA value here would tag uploads against a different
          # release than events report.
          SENTRY_RELEASE:
            openhuman@${{ needs.prepare-build.outputs.version }}+${{
            needs.prepare-build.outputs.short_sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          # SENTRY_PROJECT here is consumed by sentry-vite-plugin during
          # the Vite build — uploads frontend source maps to the React
          # Sentry project. The Rust DIFs go to SENTRY_PROJECT_CORE in the
          # dedicated step below.
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_REACT }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.settings.platform == 'macos-latest' && '10.15' || '' }}
          TAURI_CONFIG_OVERRIDE: ${{ steps.config-overrides.outputs.json }}
          MATRIX_ARGS: ${{ matrix.settings.args }}
        run: |
          NODE_OPTIONS="--max-old-space-size=8192" cargo tauri build --debug -c "$TAURI_CONFIG_OVERRIDE" $MATRIX_ARGS

      # Upload Rust debug info to Sentry so all Rust stack traces
      # symbolicate in the staging Sentry projects. Frontend source maps
      # are handled by sentry-vite-plugin in the build step above; this
      # is the Rust half.
      #
      # Two distinct binaries → two distinct Sentry projects:
      # - **Tauri shell** (`app/src-tauri/target/<triple>/debug`) — the
      #   actual desktop app users run. Core lives in-process here as a
      #   linked path dep, so the shell's DWARF covers core code too.
      #   Events all route to `openhuman-tauri` (one `sentry::init` per
      #   process, in `app/src-tauri/src/lib.rs::run()`).
      # - **Standalone CLI** (`target/<triple>/debug`) — the separate
      #   `openhuman-core` binary built by "Build sidecar core binary".
      #   Has its own `sentry::init` in `src/main.rs` and reports to
      #   `openhuman-core`. Currently unused at runtime in the desktop
      #   build but kept symbolicated for any operator running it.
      # Symbols are keyed by debug-ID so cross-platform / cross-binary
      # uploads don't collide — Sentry just merges them.
      - name: Upload Tauri shell debug symbols to Sentry (tauri project)
        if: env.SENTRY_AUTH_TOKEN != ''
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_TAURI }}
          SENTRY_RELEASE:
            openhuman@${{ needs.prepare-build.outputs.version }}+${{
            needs.prepare-build.outputs.short_sha }}
          VERSION: ${{ needs.prepare-build.outputs.version }}
          MATRIX_TARGET: ${{ matrix.settings.target }}
        run: |
          set -euo pipefail
          dif_dir="app/src-tauri/target/${MATRIX_TARGET}/debug"
          if [ -d "$dif_dir" ]; then
            echo "==> Uploading symbols from $dif_dir to ${SENTRY_PROJECT}"
            bash scripts/upload_sentry_symbols.sh "$VERSION" "$dif_dir"
          else
            echo "==> Skipping $dif_dir (not present)"
          fi

      - name: Upload standalone core CLI debug symbols to Sentry (core project)
        if: env.SENTRY_AUTH_TOKEN != ''
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_CORE }}
          SENTRY_RELEASE:
            openhuman@${{ needs.prepare-build.outputs.version }}+${{
            needs.prepare-build.outputs.short_sha }}
          VERSION: ${{ needs.prepare-build.outputs.version }}
          MATRIX_TARGET: ${{ matrix.settings.target }}
        run: |
          set -euo pipefail
          dif_dir="target/${MATRIX_TARGET}/debug"
          if [ -d "$dif_dir" ]; then
            echo "==> Uploading symbols from $dif_dir to ${SENTRY_PROJECT}"
            bash scripts/upload_sentry_symbols.sh "$VERSION" "$dif_dir"
          else
            echo "==> Skipping $dif_dir (not present)"
          fi

      - name: Upload staging desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name:
            desktop-bundles-${{ matrix.settings.platform }}-${{ matrix.settings.artifact_suffix
            }}
          path: |
            app/src-tauri/target/${{ matrix.settings.target }}/debug/bundle/**
            target/${{ matrix.settings.target }}/debug/bundle/**
      - name: Upload standalone CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name:
            standalone-bins-${{ matrix.settings.platform }}-${{ matrix.settings.artifact_suffix
            }}
          path: |
            ${{ steps.core-paths.outputs.core_target_dir }}/${{ steps.core-paths.outputs.core_bin_name }}${{ matrix.settings.platform == 'windows-latest' && '.exe' || '' }}

  # =========================================================================
  # Phase 3: Record a single Sentry deploy marker once the matrix is
  # complete. Lives in its own job (not inside `build-desktop`) because
  # `sentry-cli releases deploys ... new` does NOT deduplicate by
  # (release, env) — running it inside the matrix would add one row per
  # platform (×4 on this workflow). One row per release is the right
  # shape: re-runs of CI for the same release intentionally produce
  # additional rows representing separate deploy attempts.
  # =========================================================================
  record-sentry-deploy:
    name: Record Sentry deploy marker
    runs-on: ubuntu-latest
    environment: Production
    needs: [prepare-build, build-desktop]
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Install sentry-cli
        if: env.SENTRY_AUTH_TOKEN != ''
        shell: bash
        run: curl -sSf https://sentry.io/get-cli/ | bash
      - name: Record deploy marker
        if: env.SENTRY_AUTH_TOKEN != ''
        shell: bash
        env:
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          # Marker lives on the React project's release; events from all
          # surfaces share the same `openhuman@<version>+<short_sha>`
          # release tag, so the marker on any single project's release
          # shows in Sentry's "Deploys" tab for that release group.
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_REACT }}
          SENTRY_RELEASE:
            openhuman@${{ needs.prepare-build.outputs.version }}+${{
            needs.prepare-build.outputs.short_sha }}
          SENTRY_ENVIRONMENT: staging
        run: |
          set -euo pipefail
          echo "==> Recording deploy marker: ${SENTRY_RELEASE} -> ${SENTRY_ENVIRONMENT}"
          sentry-cli releases deploys "${SENTRY_RELEASE}" new \
            -e "${SENTRY_ENVIRONMENT}"

  # =========================================================================
  # Cleanup: if the build matrix fails or is cancelled, drop the staging
  # tag we just pushed so it doesn't pollute the staging-tag history. A
  # half-built staging tag has no use — production's `release_source`
  # resolver picks the latest staging tag, and pointing it at a known-
  # broken artifact would silently regress production. Tag deletion here
  # is safe because nothing else has consumed it yet (this job runs in
  # the same workflow run that created it).
  # =========================================================================
  cleanup-failed-staging:
    name: Remove staging tag if build failed
    runs-on: ubuntu-latest
    needs: [prepare-build, build-desktop]
    if: >-
      always()
      && needs.prepare-build.result == 'success'
      && (needs.build-desktop.result == 'failure' || needs.build-desktop.result == 'cancelled')
    steps:
      - name: Delete remote staging tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = '${{ needs.prepare-build.outputs.tag }}';
            if (!tag) {
              core.info('No staging tag to delete');
              return;
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted remote tag ${tag}`);
            } catch (e) {
              if (e.status === 404) {
                core.info(`Tag ${tag} already absent on remote`);
              } else {
                throw e;
              }
            }
